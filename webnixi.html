            ],

                address: "123 Luxury Lane, Beverly Hills, CA 90210",
                copyright: "© 2024 webnixi. All rights reserved.",
                social_links: [
                    {name:"Yelp",url:"https://yelp.com",icon_url:"https://cdn-icons-png.flaticon.com/512/174/174882.png"},
                    {name:"Instagram",url:"https://instagram.com",icon_url:"https://cdn-icons-png.flaticon.com/512/174/174855.png"},
                    {name:"TikTok",url:"https://tiktok.com",icon_url:"https://cdn-icons-png.flaticon.com/512/3046/3046121.png"},
                    {name:"X",url:"https://x.com",icon_url:"https://cdn-icons-png.flaticon.com/512/5968/5968830.png"}
                ]
            },
            section_titles: { experience:"The Experience", menu:"The Menu", reviews:"Words of Luxe", gallery:"Visual Sanctuary", about:"Our Sanctuary" },
            nav_items: [
                {id:"experience",label:"Experience",section:"experience"},
                {id:"menu",label:"Menu",section:"menu"},
                {id:"about",label:"About",section:"about"},
                {id:"gallery",label:"Gallery",section:"gallery"}
            ]
        };

        // ===== AI CHAT COMPONENT =====
        function App() {
            const [data, setData] = React.useState(null);
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [activeCat, setActiveCat] = React.useState('');
            const [selectedSvc, setSelectedSvc] = React.useState(null);
            const [cart, setCart] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
            const [cartOpen, setCartOpen] = React.useState(false);
            const [seoAdminOpen, setSeoAdminOpen] = React.useState(false);
            const [seoAdminTab, setSeoAdminTab] = React.useState('seo');
            const cartRef = React.useRef(null);
            const bizTitleRef = React.useRef({ clicks:[], timer:null });
            const [activeAdminTab, setActiveAdminTab] = React.useState('branding');
            const [isMobile, setIsMobile] = React.useState(false);
            const tapRef = React.useRef({ taps: [], lastTap: 0 });

            const ADMIN_PASS = "admin123";
            const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dgoc9andq/image/upload";
            const UPLOAD_PRESET = "faysal";

            React.useEffect(() => {
                const checkMobile = () => setIsMobile(window.innerWidth < 768);
                checkMobile();
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, []);

            const updateColors = (colors) => {
                const root = document.documentElement;
                if (colors.primary) {
                    root.style.setProperty('--primary-purple', colors.primary);
                    // Set a slightly darker variant for gradients (mix with purple)
                    root.style.setProperty('--primary-purple-dark', colors.primary);
                }
                if (colors.text_white) root.style.setProperty('--text-white', colors.text_white);
                if (colors.text_regular) root.style.setProperty('--text-regular', colors.text_regular);
                if (colors.shadow) root.style.setProperty('--shadow-color', colors.shadow);
                if (colors.nav) root.style.setProperty('--nav-color', colors.nav);
                if (colors.glow) root.style.setProperty('--glow-color', colors.glow);
                else if (colors.primary) root.style.setProperty('--glow-color', colors.primary);
                if (colors.brand_name) root.style.setProperty('--brand-name-color', colors.brand_name);
            };

            const updateAnnouncementCss = (ann) => {
                if (!ann) return;
                document.documentElement.style.setProperty('--announcement-bg', ann.bg_color || '#cc73f8');
                document.documentElement.style.setProperty('--announcement-text', ann.text_color || '#ffffff');
                if (ann.enabled) document.body.classList.add('has-announcement');
                else document.body.classList.remove('has-announcement');
            };

            const updateSeoMeta = (seo, brandName) => {
                if (!seo) return;
                const desc = document.getElementById('meta-description');
                const kw = document.getElementById('meta-keywords');
                const ogTitle = document.getElementById('og-title');
                const ogDesc = document.getElementById('og-description');
                if (desc && seo.description) desc.content = seo.description;
                if (kw && seo.keywords) kw.content = seo.keywords;
                if (ogTitle) ogTitle.content = `${brandName} – ${seo.location || 'Luxury Spa & Salon'}`;
                if (ogDesc && seo.description) ogDesc.content = seo.description;
            };

            const injectHeaderScripts = (scripts) => {
                const container = document.getElementById('gtm-head-scripts');
                if (container && scripts) container.innerHTML = scripts;
            };

            const updatePageTitle = (brandName) => {
                const el = document.getElementById('dynamic-title');
                if (el && brandName) el.textContent = brandName;
                document.title = brandName;
            };

            const updateFavicon = (url) => {
                const favicon = document.getElementById('dynamic-favicon');
                if (favicon && url) favicon.href = url;
            };

            React.useEffect(() => {
                const loadData = async () => {
                    try {
                        const response = await fetch('data.json');
                        let jsonData = {};
                        if (response.ok) jsonData = await response.json();
                        const merged = {
                            ...DEFAULT_DATA, ...jsonData,
                            brand_name: jsonData.brand_name || DEFAULT_DATA.brand_name,
                            colors: { ...DEFAULT_DATA.colors, ...(jsonData.colors || {}) },
                            announcement: { ...DEFAULT_DATA.announcement, ...(jsonData.announcement || {}) },
                            seo: { ...DEFAULT_DATA.seo, ...(jsonData.seo || {}) },
                            cart_icon: jsonData.cart_icon || DEFAULT_DATA.cart_icon
                        };
                        ['hero','about','services','full_menu','reviews','gallery','footer','section_titles','nav_items'].forEach(k => {
                            if (!merged[k]) merged[k] = DEFAULT_DATA[k];
                        });
                        if (!merged.colors.shadow) merged.colors.shadow = merged.colors.primary;
                        if (!merged.colors.nav) merged.colors.nav = merged.colors.primary;
                        if (!merged.colors.glow) merged.colors.glow = merged.colors.primary;
                        if (!merged.footer.social_links) merged.footer.social_links = DEFAULT_DATA.footer.social_links;
                        merged.reviews.forEach(r => { if (!r.links) r.links = []; });
                        setData(merged);
                        updateColors(merged.colors);
                        updateAnnouncementCss(merged.announcement);
                        updateSeoMeta(merged.seo, merged.brand_name);
                        if (merged.header_scripts) injectHeaderScripts(merged.header_scripts);
                        if (merged.brand_name) updatePageTitle(merged.brand_name);
                        if (merged.favicon) updateFavicon(merged.favicon);
                        const cats = Object.keys(merged.services || {});
                        if (cats.length > 0) { setActiveCat(cats[0]); setSelectedSvc(merged.services[cats[0]][0]); }
                    } catch (err) {
                        setData(DEFAULT_DATA);
                        updateColors(DEFAULT_DATA.colors);
                        updateAnnouncementCss(DEFAULT_DATA.announcement);
                        updateSeoMeta(DEFAULT_DATA.seo, DEFAULT_DATA.brand_name);
                        updatePageTitle(DEFAULT_DATA.brand_name);
                        const cats = Object.keys(DEFAULT_DATA.services);
                        setActiveCat(cats[0]);
                        setSelectedSvc(DEFAULT_DATA.services[cats[0]][0]);
                    } finally {
                        setTimeout(() => setLoading(false), 2000);
                    }
                };
                loadData();
            }, []);

            React.useEffect(() => {
                if (data?.brand_name) updatePageTitle(data.brand_name);
                if (data?.colors) updateColors(data.colors);
                if (data?.announcement) updateAnnouncementCss(data.announcement);
                if (data?.seo) updateSeoMeta(data.seo, data.brand_name);
            }, [data?.brand_name, data?.colors, data?.announcement, data?.seo]);

            React.useEffect(() => {
                const handleScroll = () => { if (mobileMenuOpen) setMobileMenuOpen(false); };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [mobileMenuOpen]);

            // Close cart dropdown when clicking outside
            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (cartRef.current && !cartRef.current.contains(e.target)) setCartOpen(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleBrandTap = (e) => {
                const now = Date.now();
                const td = tapRef.current;
                td.taps.push(now);
                if (td.taps.length > 3) td.taps.shift();
                if (td.taps.length === 3 && (td.taps[2] - td.taps[0]) < 600) {
                    e.preventDefault(); e.stopPropagation();
                    const password = prompt("Admin Password:");
                    if (password === ADMIN_PASS) setIsAdmin(true);
                    else if (password !== null) alert("Wrong password!");
                    td.taps = [];
                    return;
                }
                scrollToSection('home');
                if (isMobile && td.taps.length === 1) {
                    const hint = document.getElementById('tap-hint');
                    if (hint) { hint.classList.add('show'); setTimeout(() => hint.classList.remove('show'), 2000); }
                }
            };

            const handleBizTitleClick = () => {
                const ref = bizTitleRef.current;
                const now = Date.now();
                ref.clicks.push(now);
                if (ref.clicks.length > 3) ref.clicks.shift();
                if (ref.timer) clearTimeout(ref.timer);
                ref.timer = setTimeout(() => { ref.clicks = []; }, 600);
                if (ref.clicks.length === 3 && (ref.clicks[2] - ref.clicks[0]) < 600) {
                    setSeoAdminOpen(true);
                    ref.clicks = [];
                }
            };

            const uploadImg = async (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) { alert("Please select an image file only!"); return; }
                const fd = new FormData();
                fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
                try {
                    const res = await fetch(CLOUDINARY_URL, { method: "POST", body: fd });
                    const json = await res.json();
                    if (json.secure_url) { callback(json.secure_url); alert("Image Uploaded Successfully!"); }
                    else throw new Error("Upload failed");
                } catch(err) { alert("Upload Failed!"); console.error(err); }
            };

            const toggleCart = (svc) => {
                const exists = cart.find(c => c.name === svc.name);
                setCart(exists ? cart.filter(c => c.name !== svc.name) : [...cart, svc]);
            };

            const toggleMenuItem = (name, price) => {
                const exists = cart.find(c => c.name === name);
                setCart(exists ? cart.filter(c => c.name !== name) : [...cart, {name, price, desc:"Menu item", img:""}]);
            };

            const sendWhatsApp = () => {
                if (!data?.footer?.whatsapp) { alert("WhatsApp not configured!"); return; }
                const items = cart.map(c => `- ${c.name} (${c.price})`).join('%0A');
                const msg = `Booking Request from ${data.brand_name}:%0A${items}`;
                const phone = data.footer.whatsapp.replace(/\D/g,'');
                window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
            };

            const openGoogleMaps = () => {
                if (!data?.footer?.address) return;
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(data.footer.address)}`, '_blank');
            };

            const saveToGithub = async () => {
                try {
                    const fileRes = await fetch('https://api.github.com/repos/nixiwebbusiness-maker/LUMINA-_LUXE/contents/data.json');
                    const fileData = await fileRes.json();
                    const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
                    await fetch('/api/update', {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body: JSON.stringify({ content: b64, sha: fileData.sha })
                    });
                    alert("Settings Updated!"); window.location.reload();
                } catch(e) { alert("Update Failed."); console.error(e); }
            };

            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) { el.scrollIntoView({ behavior: 'smooth' }); setMobileMenuOpen(false); }
            };

            // Data update helpers
            const updateService = (cat, idx, field, val) => { const s={...data.services}; s[cat][idx][field]=val; setData({...data,services:s}); };
            const addService = (cat) => { const s={...data.services}; s[cat].push({name:"New Service",price:"$0",desc:"Description",img:"https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&h=600&fit=crop"}); setData({...data,services:s}); };
            const removeService = (cat, idx) => { const s={...data.services}; s[cat].splice(idx,1); setData({...data,services:s}); };
            const addCategory = () => { const n=prompt("New category name:"); if(n&&!data.services[n]){setData({...data,services:{...data.services,[n]:[]}});} };
            const removeCategory = (cat) => { if(confirm(`Delete "${cat}"?`)){const s={...data.services};delete s[cat];setData({...data,services:s});if(activeCat===cat){const c=Object.keys(s);if(c.length)setActiveCat(c[0]);}} };
            const updateMenu = (ci,ii,f,v) => { const m=[...data.full_menu]; if(ii===null)m[ci].cat=v; else m[ci].items[ii][f]=v; setData({...data,full_menu:m}); };
            const addMenuCategory = () => setData({...data,full_menu:[...data.full_menu,{cat:"New Category",items:[]}]});
            const addMenuItem = (ci) => { const m=[...data.full_menu]; m[ci].items.push({n:"New Item",p:"$0"}); setData({...data,full_menu:m}); };
            const removeMenuItem = (ci,ii) => { const m=[...data.full_menu]; m[ci].items.splice(ii,1); setData({...data,full_menu:m}); };
            const removeMenuCategory = (ci) => { const m=[...data.full_menu]; m.splice(ci,1); setData({...data,full_menu:m}); };
            const updateReview = (i,f,v) => { const r=[...data.reviews]; r[i][f]=v; setData({...data,reviews:r}); };
            const addReview = () => setData({...data,reviews:[...data.reviews,{name:"New Reviewer",text:"Review text",rating:5,links:[]}]});
            const removeReview = (i) => { const r=[...data.reviews]; r.splice(i,1); setData({...data,reviews:r}); };
            const updateReviewLink = (ri,li,f,v) => { const r=[...data.reviews]; r[ri].links[li][f]=v; setData({...data,reviews:r}); };
            const addReviewLink = (ri) => { const r=[...data.reviews]; if(!r[ri].links)r[ri].links=[]; r[ri].links.push({name:"Google Maps",url:"https://maps.google.com"}); setData({...data,reviews:r}); };
            const removeReviewLink = (ri,li) => { const r=[...data.reviews]; r[ri].links.splice(li,1); setData({...data,reviews:r}); };
            const updateGallery = (i,v) => { const g=[...data.gallery]; g[i]=v; setData({...data,gallery:g}); };
            const addGalleryImage = (url) => setData({...data,gallery:[...data.gallery,url]});
            const removeGalleryImage = (i) => { const g=[...data.gallery]; g.splice(i,1); setData({...data,gallery:g}); };
            const updateSectionTitle = (sec,val) => setData({...data,section_titles:{...data.section_titles,[sec]:val}});
            const updateNavItem = (i,f,v) => { const n=[...data.nav_items]; n[i][f]=v; setData({...data,nav_items:n}); };
            const addNavItem = () => setData({...data,nav_items:[...data.nav_items,{id:`nav_${Date.now()}`,label:"New Item",section:"home"}]});
            const removeNavItem = (i) => { const n=[...data.nav_items]; n.splice(i,1); setData({...data,nav_items:n}); };
            const updateHero = (f,v) => setData({...data,hero:{...data.hero,[f]:v}});
            const updateColor = (t,v) => setData({...data,colors:{...data.colors,[t]:v}});
            const updateSocialLink = (i,f,v) => { const s=[...data.footer.social_links]; s[i][f]=v; setData({...data,footer:{...data.footer,social_links:s}}); };
            const addSocialLink = () => setData({...data,footer:{...data.footer,social_links:[...data.footer.social_links,{name:"New Link",url:"https://",icon_url:""}]}});
            const removeSocialLink = (i) => { const s=[...data.footer.social_links]; s.splice(i,1); setData({...data,footer:{...data.footer,social_links:s}}); };

            const StarRating = ({ rating }) => (
                <div className="star-rating">
                    {[1,2,3,4,5].map(s => <span key={s} className={`star ${s<=rating?'filled':''}`}>★</span>)}
                </div>
            );

            if (loading) {
                return (
                    <div className="loader-container">
                        <div className="loader-grid"></div>
                        {data && (<><h1 className="loader-text serif">{data.brand_name}</h1><div className="loader-bar"><div className="loader-progress"></div></div></>)}
                    </div>
                );
            }

            if (!data) return null;

            const AdminTabs = ['branding','colors','announcement','hero','navbar','experience','menu','about','gallery','reviews','footer','social'];

            return (
                <div className="bg-[#0d0d0d] min-h-screen">
                    {isAdmin ? (
                        <div className="admin-panel tech-grid-bg">
                            <button onClick={() => setIsAdmin(false)} className="fixed top-4 right-4 z-[100] text-white w-10 h-10 rounded-full shadow-2xl font-bold hover:opacity-80 transition flex items-center justify-center" style={{background: data.colors.primary}}>✕</button>
                            
                            <div className="max-w-6xl mx-auto relative z-10">
                                <h1 className="serif text-3xl md:text-6xl font-bold mb-4 md:mb-10 border-b pb-4 text-white cursor-pointer select-none" style={{borderColor: data.colors.primary+'4D'}} onClick={handleBizTitleClick} title="Triple click for SEO panel">
                                    Business Controller
                                </h1>

                                <div className="admin-tabs-scroll flex flex-wrap gap-2 mb-6 md:mb-8">
                                    {AdminTabs.map(tab => (
                                        <button key={tab} onClick={() => setActiveAdminTab(tab)}
                                            className="admin-tab-btn transition-all whitespace-nowrap"
                                            style={{
                                                background: activeAdminTab===tab
                                                    ? `linear-gradient(135deg, ${data.colors.primary}, ${data.colors.primary}cc)`
                                                    : 'rgba(255,255,255,0.07)',
                                                color: activeAdminTab===tab ? 'white' : 'rgba(255,255,255,0.55)',

                                                        </div>
                                                        <button onClick={()=>toggleMenuItem(it.n,it.p)} className={`menu-add-btn ${cart.find(c=>c.name===it.n)?'active':''}`} style={{borderColor:data.colors.primary,color:cart.find(c=>c.name===it.n)?'white':data.colors.primary,backgroundColor:cart.find(c=>c.name===it.n)?data.colors.primary:'transparent'}}>
                                                            {cart.find(c=>c.name===it.n)?'✕':'+'}
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* About */}
                            <section id="about" className="py-16 md:py-32 px-4 relative">
                                <div className="absolute inset-0 tech-grid-bg opacity-30"></div>
                                <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-8 md:gap-20 items-center relative z-10">
                                    <div className="order-2 md:order-1">
                                        <h2 className="serif text-5xl md:text-8xl mb-6 italic glow-text" style={{color:data.colors.text_white,textShadow:`0 0 20px ${data.colors.glow||data.colors.primary}80`}}>{data.section_titles?.about || "Our Sanctuary"}</h2>
                                        <p className="text-lg md:text-2xl serif italic leading-relaxed" style={{color:data.colors.text_regular}}>{data.about.text}</p>
                                    </div>
                                    <div className="order-1 md:order-2 flex justify-center">
                                        <div className="about-arch-frame" style={{'--arch-accent': data.colors.primary, '--arch-glow': data.colors.glow||data.colors.primary}}>
                                            {/* Decorative dots */}
                                            <span className="arch-dot arch-dot-tr" style={{color:data.colors.primary}}>✦</span>
                                            <span className="arch-dot arch-dot-bl" style={{color:data.colors.primary}}>✦</span>
                                            {/* Arch background */}
                                            <div className="arch-bg" style={{background:`linear-gradient(160deg, rgba(30,20,50,0.9) 0%, rgba(15,10,25,0.95) 100%)`,border:`1.5px solid ${data.colors.primary}33`}}></div>
                                            {/* Image inside arch */}
                                            <img
                                                src={data.about.image}
                                                className="arch-img"
                                                style={{boxShadow:`0 20px 50px ${data.colors.glow||data.colors.primary}30`}}
                                                alt="About"
                                            />
                                            {/* Brand badge */}
                                            <div className="arch-badge" style={{border:`2px solid ${data.colors.primary}`,background:'rgba(13,13,13,0.9)',boxShadow:`0 0 15px ${data.colors.glow||data.colors.primary}60`}}>
                                                <span className="arch-badge-text serif italic" style={{color:data.colors.primary}}>{data.brand_name}</span>
                                            </div>
                                            {/* Corner accent lines */}
                                            <div className="arch-line-tl" style={{borderColor:data.colors.primary}}></div>
                                            <div className="arch-line-br" style={{borderColor:data.colors.primary}}></div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Gallery */}
                            <section id="gallery" className="py-16 md:py-32 px-4 tech-grid-bg relative">
                                <div className="relative z-10">
                                    <h2 className="serif text-5xl md:text-8xl text-center mb-12 md:mb-24 italic glow-text" style={{color:data.colors.text_white,textShadow:`0 0 20px ${data.colors.glow||data.colors.primary}80`}}>{data.section_titles?.gallery || "Visual Sanctuary"}</h2>
                                    <div className="max-w-7xl mx-auto masonry">
                                        {data.gallery.map((img,i)=>(
                                            <div key={i} className="break-inside-avoid overflow-hidden rounded-2xl md:rounded-[2rem] shadow-xl border-2 transition-all" style={{borderColor:`${data.colors.primary}33`}}>
                                                <img src={img} className="w-full h-auto hover:scale-110 transition duration-1000" alt={`Gallery ${i}`} loading="lazy"/>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* Reviews */}
                            <section id="reviews" className="py-16 md:py-24 px-4 relative overflow-hidden">
                                <div className="absolute inset-0 tech-grid-bg opacity-50"></div>
                                <div className="max-w-6xl mx-auto relative z-10">
                                    <h2 className="serif text-4xl md:text-6xl text-center mb-8 md:mb-16 italic glow-text" style={{color:data.colors.text_white,textShadow:`0 0 20px ${data.colors.glow||data.colors.primary}80`}}>{data.section_titles?.reviews || "Words of Luxe"}</h2>
                                    <div className="grid md:grid-cols-3 gap-4 md:gap-8">
                                        {data.reviews.map((r,i)=>(
                                            <div key={i} className="bg-white/5 backdrop-blur-sm p-6 md:p-10 rounded-2xl md:rounded-[2.5rem] border text-center" style={{borderColor:`${data.colors.primary}33`}}>
                                                <StarRating rating={r.rating||5}/>
                                                <p className="serif text-base md:text-lg mb-4 italic" style={{color:data.colors.text_regular}}>"{r.text}"</p>
                                                <h5 className="font-bold text-[10px] uppercase tracking-widest" style={{color:data.colors.primary}}>— {r.name}</h5>
                                                {r.links?.length > 0 && (
                                                    <div className="review-links-container">
                                                        {r.links.map((link,idx)=>(
                                                            <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="review-link-btn" style={{color:data.colors.primary}}>{link.name}</a>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            {/* Footer */}
                            <footer className="pt-16 md:pt-24 pb-8 px-4 md:px-10 border-t" style={{backgroundColor:'#050505',borderColor:`${data.colors.primary}33`}}>
                                <div className="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-16 border-b border-white/5 pb-12 md:pb-20">
                                    <div className="col-span-2">
                                        <h4 className="serif text-4xl md:text-6xl italic font-bold mb-4 glow-text" style={{color:data.colors.primary,textShadow:`0 0 20px ${data.colors.glow||data.colors.primary}80`}}>{data.brand_name}</h4>
                                        <h5 className="uppercase text-[10px] mb-2 tracking-widest font-bold" style={{color:data.colors.primary}}>Address</h5>
                                        <p onClick={openGoogleMaps} className="text-xs md:text-sm italic max-w-sm mb-4 address-link underline decoration-dotted" style={{color:data.colors.text_regular}} title="Click to open in Google Maps">{data.footer.address} ↗</p>
                                    </div>
                                    <div>
                                        <h5 className="uppercase text-[10px] mb-3 tracking-widest font-bold" style={{color:data.colors.primary}}>Timing</h5>
                                        <p className="text-base md:text-lg serif italic" style={{color:data.colors.text_regular}}>{data.footer.hours}</p>
                                    </div>
                                    <div>
                                        <h5 className="uppercase text-[10px] mb-3 tracking-widest font-bold" style={{color:data.colors.primary}}>Contact</h5>
                                        <a href={`https://wa.me/${data.footer.whatsapp?.replace(/\D/g,'')}`} target="_blank" className="text-base md:text-lg serif italic underline block break-all" style={{color:data.colors.text_regular}}>{data.footer.whatsapp}</a>
                                    </div>
                                </div>
                                <div className="max-w-7xl mx-auto mt-8 flex flex-col md:flex-row items-center justify-between gap-6">
                                    <p className="text-[10px] uppercase tracking-[0.3em] order-2 md:order-1" style={{color:`${data.colors.text_white}4D`}}>{data.footer.copyright}</p>
                                    <div className="flex items-center gap-4 order-1 md:order-2">
                                        <span className="text-xs uppercase tracking-widest font-bold mr-2" style={{color:data.colors.primary}}>Follow:</span>
                                        {data.footer.social_links.map((link,idx)=>(
                                            <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="social-icon" style={{borderColor:data.colors.primary,background:'transparent'}} title={link.name}>
                                                {link.icon_url
                                                    ? <div style={{position:'relative',width:'20px',height:'20px',background:data.colors.primary,borderRadius:'4px',WebkitMaskImage:`url(${link.icon_url})`,WebkitMaskSize:'contain',WebkitMaskRepeat:'no-repeat',WebkitMaskPosition:'center',maskImage:`url(${link.icon_url})`,maskSize:'contain',maskRepeat:'no-repeat',maskPosition:'center'}}/>
                                                    : <span style={{color:data.colors.primary,fontSize:'14px'}}>?</span>
                                                }
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </footer>

                            {/* AI Chat Widget */}
                            
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- GTM Body Script placeholder (inject after body tag) -->
    <div id="gtm-body-scripts"></div>
</body>
</html>
